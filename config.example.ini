# stt-ptt — Beispielkonfiguration
# Kopiere diese Datei nach ~/.config/stt-ptt/config.ini und passe sie an.
#
# ZWEI BETRIEBSARTEN:
#   1) Single-Hotkey-Modus: setze [general] backend = ... und einen globalen
#      hotkey unter [general]. Alle Aufnahmen gehen an dieses Backend.
#   2) Multi-Hotkey-Modus:  setze in den jeweiligen Backend-Sektionen je eine
#      eigene `hotkey = ...`. Je nach gedrückter Taste wird ein anderes
#      Backend angesprochen. [general] backend wird dann ignoriert.

[general]
# Backend für Single-Hotkey-Modus: elevenlabs | whisper_remote | whisper_local
backend = whisper_local

# Globaler Hotkey (nur Single-Modus).
# Beispiele: pause, scroll_lock, f9, right_ctrl, right_alt, menu, insert
hotkey = right_ctrl

# Erzwungene Sprache (ISO 639-1, z.B. "de", "en"). Leer = Auto-Erkennung.
language_code = de

# Audio
sample_rate = 16000
min_recording_seconds = 0.3
max_recording_seconds = 120

# xdotool-Tippverzögerung pro Zeichen (ms). Höher = robuster, langsamer.
type_delay_ms = 8


# ----------------------------------------------------------------------
# Backend 1: ElevenLabs (Cloud, kostenpflichtig, sehr hohe Qualität)
# ----------------------------------------------------------------------
[elevenlabs]
# hotkey = right_ctrl    # nur setzen für Multi-Hotkey-Modus
api_key  = YOUR_ELEVENLABS_API_KEY
model_id = scribe_v2


# ----------------------------------------------------------------------
# Backend 2: Whisper auf entferntem (oder lokalem) Server
# OpenAI-kompatibler Endpoint — z.B. faster-whisper-server,
# whisper.cpp Server, LocalAI oder die echte OpenAI-API.
# ----------------------------------------------------------------------
[whisper_remote]
# hotkey = right_alt     # nur setzen für Multi-Hotkey-Modus
endpoint = http://localhost:8000/v1
model    = Systran/faster-whisper-base
# api_key = ...          # falls Server Auth verlangt
timeout  = 60


# ----------------------------------------------------------------------
# Backend 3: Whisper lokal im selben Prozess (faster-whisper)
# Erstinstallation:  ./venv/bin/pip install faster-whisper
# ----------------------------------------------------------------------
[whisper_local]
# hotkey = pause         # nur setzen für Multi-Hotkey-Modus
model        = base
device       = auto
compute_type = auto
